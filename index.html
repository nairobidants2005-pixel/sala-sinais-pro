<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PRO MAX 4.6 - Ultra Agressivo</title>
<style>
body {
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}
h1 { color:#38bdf8; }
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}
.card {
  background:#0f172a;
  padding:20px;
  border-radius:15px;
  transition: background 0.3s;
}
.call { color:#22c55e; font-size:22px; }
.put { color:#ef4444; font-size:22px; }
.wait { color:#facc15; font-size:22px; }
.timer {
  margin-top:8px;
  color:#38bdf8;
  font-size:14px;
}
.blink {
  animation: blink 0.5s ease-in-out 4;
}
@keyframes blink {
  0% { background-color: #0f172a; }
  25% { background-color: #065f46; }
  50% { background-color: #0f172a; }
  75% { background-color: #065f46; }
  100% { background-color: #0f172a; }
}
</style>
</head>
<body>

<h1>🤖 PRO MAX 4.6 - Ultra Agressivo</h1>
<div class="grid" id="grid"></div>

<audio id="alertSound" src="https://www.soundjay.com/button/beep-07.wav" preload="auto"></audio>

<script>
const API_KEY = "b7a8442395824a299190dc6f20845d6a";
const pares = ["EUR/USD","GBP/USD","EUR/JPY","GBP/JPY"];
const tempos = { "EUR/USD":["1min"], "GBP/USD":["1min"], "EUR/JPY":["1min"], "GBP/JPY":["1min"] };

let pesos = { ema:1, rsi:1, tendencia:1 };
let historico = [];

function criar(){
    const grid = document.getElementById("grid");
    pares.forEach(p=>{
        tempos[p].forEach(t=>{
            const id = p.replace("/","")+t;
            grid.innerHTML += `
            <div class="card">
                <h3>${p} ${t}</h3>
                <div id="${id}" class="wait">AGUARDAR</div>
                <div id="timer_${id}" class="timer"></div>
            </div>`;
        });
    });
}

async function dados(par, tempo){
    const url=`https://api.twelvedata.com/time_series?symbol=${par}&interval=${tempo}&outputsize=10&apikey=${API_KEY}`;
    const r = await fetch(url);
    const data = await r.json();
    if(!data.values) return null;
    return data.values.map(v => ({ close: parseFloat(v.close), datetime: v.datetime }));
}

function ema(d,p){
    let k = 2/(p+1);
    let e = d[0].close;
    for(let i=1;i<d.length;i++) e = (d[i].close*k)+(e*(1-k));
    return e;
}

function rsi(d){
    let g=0,l=0;
    for(let i=1;i<d.length;i++){
        let diff = d[i].close - d[i-1].close;
        if(diff>0) g+=diff; else l -= diff;
    }
    if(l===0) return 100;
    return 100 - (100/(1+(g/l)));
}

function salvar(par, tempo, tipo, preco, candleData){
    historico.push({
        par, tempo, tipo,
        precoEntrada: preco,
        tempoEntrada: Date.now(),
        candleEntrada: candleData,
        verificado: false
    });
}

function tocarAlerta(){
    const sound = document.getElementById("alertSound");
    sound.currentTime = 0;
    sound.play();
}

// GERAR SINAL ULTRA-AGRESSIVO
async function gerar(par, tempo){
    const id = par.replace("/","")+tempo;
    const el = document.getElementById(id);

    const v = await dados(par, tempo);
    if(!v) return;

    const preco = v[0].close;
    const ema10 = ema(v,5);
    const ema50 = ema(v,8);
    const r = rsi(v);

    let sinal = "AGUARDAR";
    el.className = "wait";

    // Condições ultra-agressivas
    if((preco > ema10 || preco > ema50*0.997) && r > 48){
        sinal="CALL";
        el.className="call blink";
        tocarAlerta();
        salvar(par, tempo, "CALL", preco, v);
    } else if((preco < ema10 || preco < ema50*1.003) && r < 52){
        sinal="PUT";
        el.className="put blink";
        tocarAlerta();
        salvar(par, tempo, "PUT", preco, v);
    }

    el.innerText = sinal;
}

// VERIFICAR RESULTADOS
function verificarWinLoss(h){
    const tempoExp = 60000;
    const now = Date.now();
    if(!h.verificado && now - h.tempoEntrada >= tempoExp){
        let idx = Math.min(h.candleEntrada.length-1,1);
        const precoFinal = h.candleEntrada[idx].close;

        let win = false;
        if(h.tipo==="CALL" && precoFinal > h.precoEntrada) win=true;
        if(h.tipo==="PUT" && precoFinal < h.precoEntrada) win=true;

        h.verificado = true;

        // Ajuste IA
        if(win){
            pesos.ema += 0.05;
            pesos.rsi += 0.05;
        } else {
            pesos.ema -= 0.05;
            pesos.rsi -= 0.05;
        }
        pesos.ema = Math.max(0.1, Math.min(2, pesos.ema));
        pesos.rsi = Math.max(0.1, Math.min(2, pesos.rsi));
    }
}

function atualizarTimer(){
    const s = new Date().getSeconds();
    const t1 = 60 - s;
    document.querySelectorAll("[id^='timer_']").forEach(el=>el.innerText="⏱️ "+t1+"s");
}

setInterval(async ()=>{
    const s = new Date().getSeconds();
    atualizarTimer();

    if(s===0){
        pares.forEach(p=>{
            tempos[p].forEach(t=>{
                gerar(p,t);
            });
        });
    }

    historico.forEach(h=>verificarWinLoss(h));
},1000);

criar();
</script>
</body>
</html>
