<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PRO MAX 4.4</title>
<style>
body {
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}
h1 { color:#38bdf8; }
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}
.card {
  background:#0f172a;
  padding:20px;
  border-radius:15px;
}
.call { color:#22c55e; font-size:22px; }
.put { color:#ef4444; font-size:22px; }
.wait { color:#facc15; }
.timer {
  margin-top:8px;
  color:#38bdf8;
  font-size:14px;
}
</style>
</head>
<body>

<h1>🤖 PRO MAX 4.4</h1>
<div id="grid-container">
  <div class="grid" id="grid"></div>
</div>

<script>
const API_KEY = "b7a8442395824a299190dc6f20845d6a";
const pares = ["EUR/USD","GBP/USD","EUR/JPY","GBP/JPY"];
const tempos = { "EUR/USD":["1min"], "GBP/USD":["1min"], "EUR/JPY":["1min"], "GBP/JPY":["1min"] };

let pesos = { ema:1, rsi:1, tendencia:1 };
let historico = [];

// CRIAR GRID
function criar(){
    const grid = document.getElementById("grid");
    pares.forEach(p=>{
        tempos[p].forEach(t=>{
            const id = p.replace("/","")+t;
            grid.innerHTML += `
            <div class="card">
                <h3>${p} ${t}</h3>
                <div id="${id}" class="wait">AGUARDAR</div>
                <div id="timer_${id}" class="timer"></div>
            </div>`;
        });
    });
}

// FETCH DE DADOS
async function dados(par, tempo){
    const url=`https://api.twelvedata.com/time_series?symbol=${par}&interval=${tempo}&outputsize=10&apikey=${API_KEY}`;
    const r = await fetch(url);
    const data = await r.json();
    if(!data.values) return null;
    return data.values.map(v => ({ close: parseFloat(v.close), datetime: v.datetime }));
}

// EMA
function ema(d,p){
    let k = 2/(p+1);
    let e = d[0].close;
    for(let i=1;i<d.length;i++) e = (d[i].close*k)+(e*(1-k));
    return e;
}

// RSI
function rsi(d){
    let g=0,l=0;
    for(let i=1;i<d.length;i++){
        let diff = d[i].close - d[i-1].close;
        if(diff>0) g+=diff; else l -= diff;
    }
    if(l===0) return 100;
    return 100 - (100/(1+(g/l)));
}

// SALVAR SINAL
function salvar(par, tempo, tipo, preco, candleData){
    historico.push({
        par, tempo, tipo,
        precoEntrada: preco,
        tempoEntrada: Date.now(),
        candleEntrada: candleData,
        verificado: false
    });
}

// GERAR SINAL (mais frequente e flexível)
async function gerar(par, tempo){
    const id = par.replace("/","")+tempo;
    const el = document.getElementById(id);

    const v = await dados(par, tempo);
    if(!v) return;

    const preco = v[0].close;
    const ema10 = ema(v,5);
    const ema50 = ema(v,8);
    const r = rsi(v);

    let sinal = "AGUARDAR";
    el.className = "wait";

    // Novas condições mais flexíveis
    if(preco > ema10 && r > 55){
        sinal = "CALL";
        el.className = "call";
        salvar(par, tempo, "CALL", preco, v);
    } else if(preco < ema10 && r < 45){
        sinal = "PUT";
        el.className = "put";
        salvar(par, tempo, "PUT", preco, v);
    }

    el.innerText = sinal;
}

// VERIFICAR RESULTADOS (mantém histórico, mas sem %)
function verificarWinLoss(h){
    const tempoExp = 60000; // 1min fixo
    const now = Date.now();

    if(!h.verificado && now - h.tempoEntrada >= tempoExp){
        let idx = Math.min(h.candleEntrada.length-1,1);
        const precoFinal = h.candleEntrada[idx].close;

        let win = false;
        if(h.tipo==="CALL" && precoFinal > h.precoEntrada) win=true;
        if(h.tipo==="PUT" && precoFinal < h.precoEntrada) win=true;

        h.verificado = true;

        // Ajuste de IA
        if(win){
            pesos.ema += 0.05;
            pesos.rsi += 0.05;
        } else {
            pesos.ema -= 0.05;
            pesos.rsi -= 0.05;
        }
        pesos.ema = Math.max(0.1, Math.min(2, pesos.ema));
        pesos.rsi = Math.max(0.1, Math.min(2, pesos.rsi));
    }
}

// TIMER
function atualizarTimer(){
    const s = new Date().getSeconds();
    const t1 = 60 - s;
    document.querySelectorAll("[id^='timer_']").forEach(el=>el.innerText="⏱️ "+t1+"s");
}

// LOOP PRINCIPAL
setInterval(async ()=>{
    const s = new Date().getSeconds();
    atualizarTimer();

    // gerar sinais a cada minuto
    if(s===0){
        pares.forEach(p=>{
            tempos[p].forEach(t=>{
                gerar(p,t);
            });
        });
    }

    // verificar histórico
    historico.forEach(h=>verificarWinLoss(h));

},1000);

criar();
</script>
</body>
</html>
