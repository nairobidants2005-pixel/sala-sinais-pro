<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PRO MAX 4.1 IA REAL</title>

<style>
body {
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.card {
  background:#0f172a;
  padding:20px;
  border-radius:15px;
}

.call { color:#22c55e; }
.put { color:#ef4444; }
.wait { color:#facc15; }
</style>
</head>

<body>

<h1>🤖 PRO MAX 4.1 (IA REAL)</h1>

<div>
Win: <span id="win">0</span>% |
Total: <span id="total">0</span>
</div>

<div class="grid" id="grid"></div>

<script>
const API_KEY = "b7a8442395824a299190dc6f20845d6a";
const pares = ["EUR/USD","GBP/USD"];

let total=0, wins=0;

let pesos = { ema:1, rsi:1, tendencia:1 };

let historico = [];

// UI
function criar(){
  const grid=document.getElementById("grid");

  pares.forEach(p=>{
    ["1min","5min"].forEach(t=>{
      const id=p.replace("/","")+t;

      grid.innerHTML+=`
      <div class="card">
        <h3>${p} ${t}</h3>
        <div id="${id}" class="wait">AGUARDAR</div>
        <div id="info_${id}"></div>
      </div>`;
    });
  });
}

// API
async function dados(par, tempo){
  const url=`https://api.twelvedata.com/time_series?symbol=${par}&interval=${tempo}&outputsize=2&apikey=${API_KEY}`;
  const r=await fetch(url);
  return await r.json();
}

// EMA
function ema(d,p){
  let k=2/(p+1);
  let e=parseFloat(d[0].close);
  for(let i=1;i<d.length;i++){
    e=(parseFloat(d[i].close)*k)+(e*(1-k));
  }
  return e;
}

// RSI
function rsi(d){
  let g=0,l=0;
  for(let i=1;i<d.length;i++){
    let diff=d[i-1].close-d[i].close;
    if(diff>0) g+=diff; else l-=diff;
  }
  let rs=g/l;
  return 100-(100/(1+rs));
}

// GERAR SINAL
async function gerar(par,tempo){
  const id=par.replace("/","")+tempo;
  const el=document.getElementById(id);

  try{
    const m=await dados(par,tempo);
    if(!m.values) return;

    const v=m.values;

    const preco=parseFloat(v[0].close);

    const ema10=ema(v,2);
    const ema50=ema(v,2);
    const r=rsi(v);

    let score=0;

    if(preco>ema10) score+=pesos.ema;
    if(preco>ema50) score+=pesos.tendencia;
    if(r>60) score+=pesos.rsi;

    if(preco<ema10) score-=pesos.ema;
    if(preco<ema50) score-=pesos.tendencia;
    if(r<40) score-=pesos.rsi;

    let sinal="AGUARDAR";
    el.className="wait";

    if(score>=2){
      sinal="CALL";
      el.className="call";
      salvar(par,tempo,"CALL",preco);
    }
    else if(score<=-2){
      sinal="PUT";
      el.className="put";
      salvar(par,tempo,"PUT",preco);
    }

    el.innerText=sinal;

  }catch{}
}

// SALVAR SINAL
function salvar(par,tempo,tipo,preco){
  historico.push({
    par, tempo, tipo, precoEntrada:preco, tempoEntrada:Date.now(), verificado:false
  });
}

// VERIFICAR RESULTADO REAL
async function verificar(){
  for(let h of historico){

    if(!h.verificado){

      let tempoExp = h.tempo==="1min" ? 60000 : 300000;

      if(Date.now() - h.tempoEntrada >= tempoExp){

        const m=await dados(h.par,h.tempo);
        if(!m.values) continue;

        const precoFinal=parseFloat(m.values[0].close);

        let win=false;

        if(h.tipo==="CALL" && precoFinal>h.precoEntrada) win=true;
        if(h.tipo==="PUT" && precoFinal<h.precoEntrada) win=true;

        h.verificado=true;

        total++;

        if(win){
          wins++;
          ajustar(true);
        } else {
          ajustar(false);
        }

        document.getElementById("total").innerText=total;
        document.getElementById("win").innerText=((wins/total)*100).toFixed(1);
      }
    }
  }
}

// IA AJUSTE
function ajustar(win){
  if(win){
    pesos.ema+=0.05;
    pesos.rsi+=0.05;
  } else {
    pesos.ema-=0.05;
    pesos.rsi-=0.05;
  }

  pesos.ema=Math.max(0.1,Math.min(2,pesos.ema));
  pesos.rsi=Math.max(0.1,Math.min(2,pesos.rsi));
}

// LOOP
setInterval(()=>{
  pares.forEach(p=>{
    gerar(p,"1min");
    gerar(p,"5min");
  });

  verificar();

},5000);

criar();
</script>

</body>
</html>
