<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sala de Sinais PRO MAX</title>

<style>
body {
  background: #020617;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin: 20px;
  color: #38bdf8;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.sinal {
  font-size: 24px;
  margin-top: 10px;
}

.call { color: #22c55e; }
.put { color: #ef4444; }
.wait { color: #facc15; }

.timer {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🚀 Sala de Sinais PRO MAX</h1>

<div class="grid" id="grid"></div>

<script>
const API_KEY = "b7a8442395824a299190dc6f20845d6a";
const pares = ["EUR/USD","GBP/USD"];

function criar() {
  const grid = document.getElementById("grid");

  pares.forEach(p => {
    ["1min","5min"].forEach(t => {
      const id = p.replace("/","") + t;

      grid.innerHTML += `
      <div class="card">
        <h3>${p} ${t}</h3>
        <div id="${id}" class="sinal wait">AGUARDAR</div>
        <div id="timer_${id}" class="timer"></div>
      </div>`;
    });
  });
}

async function dados(par, tempo) {
  const url = `https://api.twelvedata.com/time_series?symbol=${par}&interval=${tempo}&outputsize=100&apikey=${API_KEY}`;
  const r = await fetch(url);
  return await r.json();
}

// EMA
function ema(d, p) {
  let k = 2/(p+1);
  let e = parseFloat(d[0].close);

  for(let i=1;i<d.length;i++){
    e = (parseFloat(d[i].close)*k)+(e*(1-k));
  }
  return e;
}

// RSI
function rsi(d) {
  let g=0,l=0;
  for(let i=1;i<15;i++){
    let diff=d[i-1].close-d[i].close;
    if(diff>0) g+=diff; else l-=diff;
  }
  let rs=g/l;
  return 100-(100/(1+rs));
}

// LATERALIZAÇÃO
function lateral(d){
  let max=0,min=999999;
  for(let i=0;i<20;i++){
    let c=parseFloat(d[i].close);
    if(c>max) max=c;
    if(c<min) min=c;
  }
  return (max-min)<0.0005;
}

// GERADOR PRO
async function gerar(par, tempo){
  const id = par.replace("/","")+tempo;
  const el = document.getElementById(id);

  try {
    const m1 = await dados(par, tempo);
    const m15 = await dados(par, "15min");

    if(!m1.values || !m15.values){
      el.innerText="ERRO";
      return;
    }

    const v = m1.values;
    const v15 = m15.values;

    const preco = parseFloat(v[0].close);
    const ema10 = ema(v,10);
    const ema15 = ema(v15,10);
    const r = rsi(v);

    let sinal="AGUARDAR";
    el.className="sinal wait";

    if(!lateral(v)){
      // CALL
      if(preco>ema10 && preco>ema15 && r>55){
        sinal="CALL";
        el.className="sinal call";
      }
      // PUT
      else if(preco<ema10 && preco<ema15 && r<45){
        sinal="PUT";
        el.className="sinal put";
      }
    }

    el.innerText=sinal;

  } catch {
    el.innerText="ERRO";
  }
}

// TIMER
function timer(){
  const now=new Date();
  const s=now.getSeconds();
  const m=now.getMinutes();

  const m1=60-s;
  const m5=(5-(m%5))*60-s;

  document.querySelectorAll(".timer").forEach(el=>{
    if(el.id.includes("1min")) el.innerText=m1+"s";
    else el.innerText=m5+"s";
  });

 if(m1<=1) pares.forEach(p=>gerar(p,"1min"));
  if(m5===0) pares.forEach(p=>gerar(p,"5min"));
}

criar();
setInterval(timer,2000);

pares.forEach(p=>{
  gerar(p,"1min");
  gerar(p,"5min");
});
</script>

</body>
</html>
